services:
  # Inbound: receives emails via SMTP, publishes to Nostr
  inbound-smtp:
    image: ghcr.io/nogringo/nostr-mail-inbound-smtp:latest
    ports:
      - "25:25"
    environment:
      - INBOUND_PRIVATE_KEY=${INBOUND_PRIVATE_KEY}
      - SMTP_PORT=25
      - SMTP_HOST=0.0.0.0
      - PLUGIN_PATH=${PLUGIN_PATH:-}
    volumes:
      - ./bridge-plugins:/app/plugins
    restart: unless-stopped

  # Outbound: listens to Nostr, sends emails via Postfix
  bridge:
    image: ghcr.io/nogringo/nostr-mail-outbound:latest
    environment:
      - BRIDGE_PRIVATE_KEY=${BRIDGE_PRIVATE_KEY}
      - OUTBOUND_PROVIDER=smtp
      - FROM_DOMAIN=${FROM_DOMAIN}
      - SMTP_HOST=postfix
      - SMTP_PORT=25
      - SMTP_SECURE=false
      - SMTP_REJECT_UNAUTHORIZED=false
      - PLUGIN_PATH=${PLUGIN_PATH:-}
    volumes:
      - ./bridge-plugins:/app/bridge/plugins
    depends_on:
      - postfix
    restart: unless-stopped

  # NIP-05 discovery service
  nip05-service:
    image: ghcr.io/nogringo/nostr-mail-nip05-service:latest
    ports:
      - "3000:3000"
    environment:
      - BRIDGE_PUBKEY=${BRIDGE_PUBKEY}
      - USER_STORE_PATH=/data/users.json
      - HTTP_PORT=3000
    volumes:
      - ./nip05-data:/data
    restart: unless-stopped

  # Postfix for outbound email delivery
  postfix:
    image: boky/postfix
    environment:
      - DKIM_AUTOGENERATE=true
      - ALLOWED_SENDER_DOMAINS=${FROM_DOMAIN}
      - SMTP_DISABLE_TLS=true
    volumes:
      - ./dkim-keys:/etc/opendkim/keys
    restart: unless-stopped
